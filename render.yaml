services:
  - type: web
    name: algoedge
    runtime: python
    repo: https://github.com/mbuguam443/AlgoEdge.git
    plan: free
    region: frankfurt
    buildCommand: ./build.sh
    startCommand: gunicorn algoedge.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SITE_URL
        value: https://algoedge.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: algoedge-db
          property: connectionString
      - key: DJANGO_SECURE_SSL
        value: "True"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: PYTHON_VERSION
        value: "3.12.5"

databases:
  - name: algoedge-db
    plan: free
    region: frankfurt
    databaseName: algoedge
    user: algoedge
