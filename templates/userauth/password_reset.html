{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" data-aos="fade-up">
        <div class="auth-header">
            <h3>Reset Password</h3>
            <p>Enter your email to receive reset instructions</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-gold w-100 btn-gold-lg">Send Reset Link</button>
        </form>
        <div class="text-center mt-4">
            <a href="{% url 'userauth:login' %}" style="color:var(--accent-gold);text-decoration:none;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
