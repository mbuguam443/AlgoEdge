{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page">
    <div class="auth-card text-center" data-aos="fade-up">
        <i class="fas fa-check-circle" style="font-size:3rem;color:var(--success);margin-bottom:1rem;"></i>
        <h3>Password Reset Complete</h3>
        <p style="color:var(--text-secondary);">Your password has been successfully reset.</p>
        <a href="{% url 'userauth:login' %}" class="btn btn-gold mt-3">Sign In</a>
    </div>
</div>
{% endblock %}
