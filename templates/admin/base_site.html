{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | AlgoEdge Admin{% endblock %}

{% block branding %}
<div style="display:flex;align-items:center;gap:12px;padding:10px 20px;">
    <img src="{% static 'logos/logo.png' %}" alt="AlgoEdge" height="35" onerror="this.style.display='none'">
    <h1 style="font-weight:800;color:#D4AF37;margin:0;font-size:1.5rem;">ALGOEDGE Admin</h1>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
<style>
    :root {
        --primary: #0A0F1F;
        --secondary: #111827;
        --accent: #D4AF37;
        --link-fg: #D4AF37;
        --link-selected-fg: #E5C85F;
        --header-bg: #0A0F1F;
        --header-color: #D4AF37;
        --breadcrumbs-bg: #111827;
        --breadcrumbs-fg: #D4AF37;
        --selected-row: rgba(212,175,55,0.1);
        --darkened-bg: #111827;
        --body-bg: #0A0F1F;
        --body-fg: #e0e0e0;
        --body-quiet-color: #94A3B8;
        --border-color: rgba(212,175,55,0.15);
    }
    #header { background: var(--header-bg); border-bottom: 1px solid var(--border-color); }
    #user-tools a { color: var(--accent) !important; }
    .module h2, .module caption { background: var(--secondary); }
    .button, input[type=submit], input[type=button] { background: var(--accent); color: #000; }
    .button:hover, input[type=submit]:hover { background: #E5C85F; }
    a:link, a:visited { color: var(--accent); }
    #changelist .actions { background: var(--secondary); }
    .paginator { background: var(--secondary); }
    .object-tools a { background: var(--accent); color: #000; }
</style>
{% endblock %}
